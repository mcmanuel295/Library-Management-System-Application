    password: ${RABBITMQ_PASSWORD:Oea75357@}


catalog:
  page-size: 10

  exchange-name: exchange-name

  borrow-book-queue: borrowed-book-queue
  returned-book-queue : returned-book-queue
  new-book-queue : new-book-queue


server:
  port: 8081
  shutdown: GRACEFUL
