spring:
  application:
    name: catalog-service
  datasource:
    username: root
    password: Oea75357@
    url: jdbc:mysql://localhost:3307/catalog?createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update

    show-sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
