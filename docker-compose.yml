services:
  #  CATALOG -SERVICES
  catalog-db:
    container_name: catalog-db
    image: mysql:latest
    networks:
      - catalog_network
    volumes:
      - catalog_data:/var/lib/mysql
    environment:
      - MYSQL_PASSWORD="Oea75357@"
      - MYSQL_USER= "root"
      - MYSQL_URL=jdbc:mysql://catalog-db:3306/catalog
      - MYSQL_DATABASE=catalog
    ports:
      - "3307:3306"

  user-db:
    container_name: user-db
    image: mysql:latest
    networks:
      - user_network
    volumes:
      - user_data:/var/lib/mysql
    environment:
      - MYSQL_PASSWORD="Oea75357@"
      - MYSQL_USER= "root"
      - MYSQL_URL=jdbc:mysql://user-db:3306/user
      - MYSQL_DATABASE=user
    ports:
      - "3308:3306"

volumes:
  catalog_data: # Separate storage for catalog
    driver: local
  user_data: # Separate storage for user
    driver: local

networks:
  catalog_network:
    driver: bridge
  user_network:
    driver: bridge
