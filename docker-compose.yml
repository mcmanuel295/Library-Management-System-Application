services:
  #  CATALOG -SERVICES
  catalog-db:
    container_name: catalog-db
    image: mysql:latest
    networks:
      - catalog_network
    volumes:
      - var:/var/lib/catalog
    environment:
      - MYSQL_ROOT_PASSWORD=Oea75357@
      - MYSQL_USER= "root"
      - MYSQL_URL=jdbc:mysql://catalog-db:3308/catalog
    ports:
      - "3308:3306"

  user-db:
    container_name: user-db
    image: mysql:latest
    networks:
      - user_network
    volumes:
      - var:/var/lib/user
    environment:
      - MYSQL_ROOT_PASSWORD=Oea75357@
      - MYSQL_USER= "root"
      - MYSQL_URL=jdbc:mysql://user-db:3306/user
    ports:
      - "3307:3306"

volumes:
  var:
    driver: local

networks:
  catalog_network:
    driver: bridge
  user_network:
    driver: bridge
