services:
  book-db:
    container_name: book-db
    image: mysql
    networks:
      - library_network
      -
    volumes:
      - var:lib/var/app/db

    environment:
      - MYDQL_password: Oea75357@
      - MYSQL_USER: root
      - MYSQL_URL: jdbc:mysql:book-db://3306/mysql

    ports:
      - 3306:3306



  book-service:
    image: mcmanuel295/bsi
    container_name: book-service
    ports:
      - 8081:8081

    depends_on:
      - book-db:
          condition: service-healthy
    restart: unless-stopped

    networks:
      -library_network


volumes:
  library_network:
    driver: local

networks:
